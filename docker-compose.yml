version: "3.8"

services:
  trader:
    build: .
    container_name: polymarket-trader
    command: ["python", "-m", "polymarket_agent.main", "trade"]
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_DATA_DIR=/app/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "1.0"
    tmpfs:
      - /tmp
      - /var/tmp
    volumes:
      - trade-data:/app/data
      - ./config:/app/config:ro
      - trade-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 60s
      timeout: 10s
      start_period: 300s
      retries: 3

  dashboard:
    build: .
    container_name: polymarket-dashboard
    command:
      [
        "streamlit",
        "run",
        "dashboard/app.py",
        "--server.port=8501",
        "--server.address=127.0.0.1",
      ]
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_DATA_DIR=/app/data
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    ports:
      - "8501:8501"
    volumes:
      - trade-data:/app/data:ro
      - trade-logs:/app/logs:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      trader:
        condition: service_healthy

  postgres:
    profiles: ["with-postgres"]
    image: postgres:16
    container_name: polymarket-postgres
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  trade-data:
  trade-logs:
  postgres-data:
